site_name: xtremax
site_description: JAX/NumPyro-native library for extreme value modeling — custom distributions, Bayesian models, and spatiotemporal data extraction.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/xtremax
repo_name: jejjohnson/xtremax

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Examples:
      - Demo: notebooks/example_demo.ipynb
      - EVT distributions overview: notebooks/evt_distributions_overview.ipynb
      - Fréchet on heavy-tailed maxima: notebooks/evt_frechet_heavy_tails.ipynb
      - HPP — from scratch + NumPyro: notebooks/hpp_from_scratch_and_numpyro.ipynb
      - IPP — from scratch + NumPyro: notebooks/ipp_from_scratch_and_numpyro.ipynb
      - Renewal — from scratch + NumPyro: notebooks/renewal_from_scratch_and_numpyro.ipynb
      - Hawkes — from scratch + NumPyro: notebooks/hawkes_from_scratch_and_numpyro.ipynb
      - Marked TPP — from scratch + NumPyro: notebooks/marked_from_scratch_and_numpyro.ipynb
      - Thinning / observation op — from scratch + NumPyro: notebooks/thinning_from_scratch_and_numpyro.ipynb
      - HPP-spatial — from scratch + NumPyro: notebooks/hpp_spatial_from_scratch_and_numpyro.ipynb
      - IPP-spatial — from scratch + NumPyro: notebooks/ipp_spatial_from_scratch_and_numpyro.ipynb
      - Marked spatial — from scratch + NumPyro: notebooks/marked_spatial_from_scratch_and_numpyro.ipynb
      - HPP-spatiotemporal — from scratch + NumPyro: notebooks/hpp_spatiotemporal_from_scratch_and_numpyro.ipynb
      - IPP-spatiotemporal — from scratch + NumPyro: notebooks/ipp_spatiotemporal_from_scratch_and_numpyro.ipynb
      - Marked spatiotemporal — from scratch + NumPyro: notebooks/marked_spatiotemporal_from_scratch_and_numpyro.ipynb
      - Hawkes-spatiotemporal — from scratch + NumPyro: notebooks/hawkes_spatiotemporal_from_scratch_and_numpyro.ipynb
      - Latent ODE for irregular IPPs: notebooks/latent_ode_ipp.ipynb
  - Design:
      - Overview: design_docs/README.md
      - Vision: design_docs/vision.md
      - Architecture: design_docs/architecture.md
      - Boundaries: design_docs/boundaries.md
      - Decisions: design_docs/decisions.md
      - API:
          - Overview: design_docs/api/README.md
          - Primitives: design_docs/api/primitives.md
          - Components: design_docs/api/components.md
          - Models: design_docs/api/models.md
      - Examples:
          - Overview: design_docs/examples/README.md
          - Primitives: design_docs/examples/primitives.md
          - Components: design_docs/examples/components.md
          - Models: design_docs/examples/models.md
          - Integration: design_docs/examples/integration.md
  - API Reference: api/reference.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: [!relative $docs_dir/..]
      check_paths: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js

site_name: xtremax
site_description: My short description for my project.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/xtremax
repo_name: jejjohnson/xtremax

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Examples:
      - Demo: notebooks/example_demo.ipynb
  - Design:
      - Overview: design_docs/README.md
      - Vision: design_docs/vision.md
      - Architecture: design_docs/architecture.md
      - Boundaries: design_docs/boundaries.md
      - Decisions: design_docs/decisions.md
      - API:
          - Overview: design_docs/api/README.md
          - Primitives: design_docs/api/primitives.md
          - Components: design_docs/api/components.md
          - Models: design_docs/api/models.md
      - Examples:
          - Overview: design_docs/examples/README.md
          - Primitives: design_docs/examples/primitives.md
          - Components: design_docs/examples/components.md
          - Models: design_docs/examples/models.md
          - Integration: design_docs/examples/integration.md
  - API Reference: api/reference.md
  - Contributing: contributing.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
